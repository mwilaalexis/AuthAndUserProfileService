name: .NET CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore UserProfileService.sln

      - name: Build
        run: dotnet build UserProfileService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test UserProfileService.sln --no-build --verbosity normal
