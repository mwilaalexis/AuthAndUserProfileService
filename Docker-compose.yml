version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    restart: always

  userprofileservice:
    build:
      context: .
      dockerfile: UserProfileServiceProject/Dockerfile
    container_name: userprofileservice
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=NutriGuide;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;"
    ports:
      - "8080:8080"
